name: Deploy to Vercel Account

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: vercel-account-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_ACCOUNT }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_ACCOUNT }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ACCOUNT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Check required secrets
        shell: bash
        run: |
          missing=0

          for variable in \
            VERCEL_TOKEN \
            VERCEL_ORG_ID \
            VERCEL_PROJECT_ID
          do
            if [ -z "${!variable:-}" ]; then
              echo "::error::$variable is missing or empty"
              missing=1
            fi
          done

          exit "$missing"

      - name: Install Vercel CLI
        run: |
          npm install --global vercel@latest
          vercel --version

      - name: Pull production configuration
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token="$VERCEL_TOKEN"

      - name: Build production project
        run: |
          vercel build \
            --prod \
            --yes \
            --token="$VERCEL_TOKEN"

      - name: Deploy production
        shell: bash
        run: |
          set +e

          vercel deploy \
            --prebuilt \
            --prod \
            --yes \
            --token="$VERCEL_TOKEN" \
            > deployment-url.txt \
            2> vercel-error.txt

          status=$?

          echo "Deployment URL output:"
          cat deployment-url.txt || true

          echo ""
          echo "Vercel error output:"
          cat vercel-error.txt || true

          exit "$status"
